name: Deploy frontend to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Compute base path
        id: base
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY##*/}"
          echo "path=/${repo}/" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: frontend
        env:
          # GitHub Pages "project site" base path: /REPO_NAME/
          VITE_BASE_PATH: ${{ steps.base.outputs.path }}
          # Set this repo variable to your publicly reachable API URL (must be https for GitHub Pages):
          # Settings → Secrets and variables → Actions → Variables → VITE_API_BASE_URL
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: SPA fallback for GitHub Pages
        working-directory: frontend
        shell: bash
        run: |
          cp dist/index.html dist/404.html
          # Ensure Jekyll doesn't ignore underscored paths (belt-and-suspenders).
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
