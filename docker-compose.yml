services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oms
    ports:
      - "5432:5432"
    volumes:
      - ./db/supabase_init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - oms_postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build:
      context: ./backend/Oms.Api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      DemoSeed__Enabled: "true"
      ConnectionStrings__OmsDb: Host=postgres;Port=5432;Database=oms;Username=postgres;Password=postgres;
      Jwt__Issuer: oms
      Jwt__Audience: oms
      Jwt__SigningKey: CHANGE_ME_IN_PROD_please_use_env_or_secret_store
      App__FrontendUrl: ${App__FrontendUrl:-http://localhost:5173}
      Smtp__Enabled: ${Smtp__Enabled:-true}
      Smtp__Host: ${Smtp__Host:-mailpit}
      Smtp__Port: ${Smtp__Port:-1025}
      Smtp__EnableSsl: ${Smtp__EnableSsl:-false}
      Smtp__Username: ${Smtp__Username:-}
      Smtp__Password: ${Smtp__Password:-}
      Smtp__From: ${Smtp__From:-no-reply@alwakeel-alshamel.local}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - mailpit

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  oms_postgres_data:
